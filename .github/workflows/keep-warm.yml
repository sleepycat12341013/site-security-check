name: keep-warm

# Render 無料枠は 15 分アクセスがないとスリープする。
# 定期 ping でコールドスタート（初回数十秒待ち）を防ぐ。
on:
  schedule:
    # 10 分おき / cron は UTC。
    # UTC 23:00〜15:59 = JST 8:00〜翌 1:00 の間だけ起こす（応募者が触る時間帯・無料枠節約）。
    - cron: '*/10 23,0-15 * * *'
  workflow_dispatch: {} # 手動実行も可

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping site-security-check
        # -f: HTTP エラーで失敗 / -sS: 静かだがエラーは出す / --max-time: 起床待ちを許容
        run: curl -fsS --max-time 90 https://site-security-check.onrender.com/ > /dev/null
